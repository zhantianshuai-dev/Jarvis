version: '3.8'

# ============================================================
# Jarvis Memory Service — 云服务器部署
# 启动: docker compose -f docker-compose.prod.yml up -d
# 停止: docker compose -f docker-compose.prod.yml down
# 清理数据: docker compose -f docker-compose.prod.yml down -v
# ============================================================

services:

  # ---- PostgreSQL 16 + pgvector（向量 + 元数据二合一） ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ov-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: memorydb
    volumes:
      - ${DATA_DIR:-/data/jarvis}/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d memorydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ov-network

networks:
  ov-network:
    driver: bridge