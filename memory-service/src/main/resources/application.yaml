spring:
  application:
    name: memory-service
  threads:
    virtual:
      enabled: true       # JDK 21 虚拟线程全局启用
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:postgres}?sslmode=${PG_SSL_MODE:disable}
    driver-class-name: org.postgresql.Driver
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:}

memory-service:
  postgres:
    # 默认关闭 PostgreSQL，避免远程数据库不可达时阻塞 memory-service 启动。
    # 开启后才会创建 DataSource、PgVectorStore 和 JDBC TokenUsageTracker。
    # 启动示例: MEMORY_SERVICE_POSTGRES_ENABLED=true PG_PASSWORD=xxx ./mvnw spring-boot:run -pl memory-service
    enabled: ${MEMORY_SERVICE_POSTGRES_ENABLED:false}

  # ---- LLM 模型（摘要生成、意图分析、记忆提取）----
  # 所有兼容 OpenAI /chat/completions 格式的 API 均可
  llm:
    provider: deepseek
    api-key: ${LLM_API_KEY:}
    api-base: ${LLM_API_BASE:https://easyrouter.io}
    model: ${LLM_MODEL:deepseek-v4-flash}
    temperature: 0.0

  # ---- Embedding 模型（文本向量化）----
  # 百炼兼容 OpenAI /embeddings 格式: https://dashscope.aliyuncs.com/compatible-mode/v1
  embedding:
    provider: bailian
    api-key: ${EMBEDDING_API_KEY:}
    api-base: ${EMBEDDING_API_BASE:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${EMBEDDING_MODEL:text-embedding-v4}             # 百炼向量模型
    dimension: ${EMBEDDING_DIMENSION:1024}                  # text-embedding-v4=1024

  # ---- Rerank 模型（检索结果重排序，提升精度）----
  # 可选，不配则不启用 rerank，直接使用向量分数
  # 兼容 Cohere /v1/rerank 格式，或用兼容 OpenAI 的 rerank 接口
  rerank:
    provider: bailian         # cohere | openai-compatible | (空 = 不启用 rerank)
    api-key: ${RERANK_API_KEY:}
    api-base: ${RERANK_API_BASE:https://dashscope.aliyuncs.com/compatible-api/v1}
    model: ${RERANK_MODEL:qwen3-rerank}
    threshold: 0.3                        # 分数低于此值的结果会被过滤

  # ---- 长期记忆配置 ----
  memory:
    dedup:
      top-k: ${MEMORY_DEDUP_TOP_K:10}      # 向量初筛召回数量
      similarity-threshold: ${MEMORY_DEDUP_SIMILARITY_THRESHOLD:0.75}

  # ---- 检索参数 ----
  retrieval:
    max-convergence-rounds: 3
    global-search-topk: 10
    max-relations: 5
    directory-dominance-ratio: 1.2
    hotness-alpha: 0.3
    score-propagation-alpha: 0.7
    default-half-life-days: 7.0

  # ---- Session 存储（JSONL）----
  session:
    workspace: ${SESSION_WORKSPACE:./sessions}

# 启动端口
server:
  port: 8081
