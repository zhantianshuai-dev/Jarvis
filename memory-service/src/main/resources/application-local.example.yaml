spring:
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:postgres}?sslmode=${PG_SSL_MODE:disable}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:}

memory-service:
  postgres:
    enabled: ${MEMORY_SERVICE_POSTGRES_ENABLED:false}

  llm:
    api-key: ${LLM_API_KEY:}
    api-base: ${LLM_API_BASE:https://easyrouter.io}
    model: ${LLM_MODEL:deepseek-v4-flash}

  embedding:
    api-key: ${EMBEDDING_API_KEY:}
    api-base: ${EMBEDDING_API_BASE:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${EMBEDDING_MODEL:text-embedding-v4}

  rerank:
    api-key: ${RERANK_API_KEY:}
    api-base: ${RERANK_API_BASE:https://dashscope.aliyuncs.com/compatible-api/v1}
    model: ${RERANK_MODEL:qwen3-rerank}
